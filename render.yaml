services:
  - type: web
    name: it-agent-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend

    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1

    envVars:
      - key: OPENROUTER_API_KEY
        sync: false

      - key: ADMIN_PANEL_URL
        value: https://it-agent-backend.onrender.com

      - key: SLACK_BOT_TOKEN
        sync: false

      - key: SLACK_APP_TOKEN
        sync: false

      - key: PYTHON_VERSION
        value: "3.11.0"